name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: golangci/golangci-lint-action@v6

  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build
        run: go build ./...
      - name: Test
        run: go test -v -race ./...
      - name: Benchmark
        run: go test -bench=. -benchmem -benchtime=1s ./...

  test-cross-arch:
    strategy:
      matrix:
        include:
          - arch: ppc64le
            distro: ubuntu_latest
          - arch: s390x
            distro: ubuntu_latest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: uraimo/run-on-arch-action@v3
        name: Test on ${{ matrix.arch }}
        with:
          arch: ${{ matrix.arch }}
          distro: ${{ matrix.distro }}
          dockerRunArgs: --volume "${PWD}:/work"
          install: |
            apt-get update -q -y
            apt-get install -y golang-go gcc g++
          run: |
            cd /work
            go build ./...
            go test -count=1 ./...
